<!DOCTYPE html>
<html>
<head>
    <title>Bake Mo, Kwenta Ko - Pre-Order</title>
    <style>
        body {
            background-image: url('bg3.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        header {
            background-color: rgba(255, 255, 255, 0.945);
            color: white;
            text-align: center;
            position: relative;
            height: 140px;
            width: 100%;
            display: block;
        }
        .logo {
            position: absolute;
            top: 15px;
            right: 20px;
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid white;
        }
        nav {
            background-color: rgba(247, 247, 247, 0.9);
            text-align: center;
            padding: 10px;
            display: block;
        }
        nav a {
            color: black;
            text-decoration: none;
            font-weight: bold;
            margin: 15px;
            display: inline-block;
        }
        .container {
            width: 80%;
            margin: 30px auto;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 30px;
            display: block;
            border-radius: 15px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin: 5px 0 15px 0;
            display: block;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            background-color: #ffa500;
            color: white;
            width: 100%;
            height: 45px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 16px;
        }
        footer {
            background-color: rgba(0, 0, 0, 0.9);
            color: white;
            text-align: center;
            padding: 15px;
            display: block;
            margin-top: 20px;
        }
        label {
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>
    <header>
        <img src="logo1.jpg" alt="Logo" class="logo">
        <br>
        <h1>Bake Mo, Kwenta Ko</h1>
        <p>Pre-Order Your Favorite Pastries</p>
    </header>
    <nav>
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="order.html">Pre-Order</a>
    </nav>
    <div class="container">
        <form>
            <label>Full Name:</label>
            <input type="text" placeholder="Enter your name" required>

            <label>Email Address:</label>
            <input type="email" placeholder="email@example.com" required>

            <label>Select Pastry:</label>
            <select>
                <option>Signature Croissant</option>
                <option>Pain au Chocolat</option>
                <option>Fruit Danish</option>
                <option>Chocolate Éclair</option>
                <option>Cream Puffs</option>
                <option>Cannoli</option>
                <option>Baklava</option>
                <option>Tart Tatin</option>
                <option>Macarons</option>
                <option>Apple Strudel</option>
            </select>

            <label>Quantity:</label>
            <input type="number" min="1" value="1" required>

            <label>Delivery Address:</label>
            <textarea rows="3" placeholder="Enter your complete address" required></textarea>

            <button type="submit">Place Pre-Order</button>
        </form>
    </div>
    <footer>
        <p>9-BK Group#4 | PUP Laboratory High School</p>
    </footer>
</body>
</html>
